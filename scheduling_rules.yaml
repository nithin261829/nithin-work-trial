# Office scheduling rules - single source of truth.
# Used by nexhealth_scheduler.py (batch booking) and webapp/backend (chat assistant).

practice:
  name: Green River Dental
  subdomain: 10xdental-demo-practice
  location_id: 340195
  timezone: America/New_York
  open: "08:00"
  close: "17:00"
  days: [Monday, Tuesday, Wednesday, Thursday, Friday]

# Treatments the practice does NOT perform. Patients needing these get a
# referral conversation, never an appointment for the treatment itself.
not_offered:
  implant: "We don't place implants here - the surgical phase is referred out to an oral surgeon."

# Categories that must NOT start at or after this local time.
afternoon_cutoff:
  time: "15:00"
  applies_to: [crown, bridge, root_canal, veneer]

# Appointment length and NexHealth appointment-type name per treatment category.
appointments:
  bridge:       {type_name: "Bridge Work",              minutes: 120}
  crown:        {type_name: "Crown",                    minutes: 90}
  root_canal:   {type_name: "Root Canal (120 min)",     minutes: 120}
  veneer:       {type_name: "Veneer",                   minutes: 90}
  extraction:   {type_name: "Extraction (60 min)",      minutes: 60}
  filling:      {type_name: "Filling (60 min)",         minutes: 60}
  denture:      {type_name: "Denture/Partial Visit",    minutes: 30}   # exam / post-op / impressions
  sealant:      {type_name: "Sealant/Space Maintainer", minutes: 30}
  consultation: {type_name: "Consultation",             minutes: 30}

# Patients whose insurance is inactive or missing get a consultation first,
# not treatment - the money conversation happens before chair time.
no_coverage_policy: consultation
